name: PetHabit
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "15.6"
  xcodeVersion: "15.0"
  developmentLanguage: en
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "9L6N2ZF26B"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

configs:
  Debug:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
  Release:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  PetHabit:
    type: application
    platform: iOS
    sources:
      - path: Modules/PetHabit/Sources
        type: group
      - path: Modules/PetHabit/Assets.xcassets
        type: group
    resources:
      - path: Modules/PetHabit/Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.PetHabit
        INFOPLIST_FILE: Modules/PetHabit/Info.plist
        CODE_SIGN_ENTITLEMENTS: Modules/PetHabit/PetHabit.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
    dependencies:
      - target: PetHabitTests
        embed: true
      - target: PetHabitUITests
        embed: true
    postBuildScripts: []

  PetHabitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Modules/PetHabit/Tests/Unit
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.PetHabitTests
        INFOPLIST_FILE: Modules/PetHabit/Tests/Unit/Info.plist
        TEST_HOST: "$(TARGETED_DEVICE_FAMILY == 1 ? $(BUILT_PRODUCTS_DIR)/PetHabit.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PetHabit : $(BUILT_PRODUCTS_DIR)/PetHabit.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PetHabit)"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "9L6N2ZF26B"

  PetHabitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Modules/PetHabit/Tests/UI
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.PetHabitUITests
        INFOPLIST_FILE: Modules/PetHabit/Tests/UI/Info.plist
        TEST_TARGET_NAME: PetHabit
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "9L6N2ZF26B"

schemes:
  PetHabit:
    build:
      targets:
        PetHabit: all
        PetHabitTests: [test]
        PetHabitUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PetHabitTests
        - PetHabitUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
